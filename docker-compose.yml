services:
  postgres:
    image: postgres:18-alpine
    container_name: erp_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d erp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
